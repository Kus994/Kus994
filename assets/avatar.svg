<svg xmlns="http://www.w3.org/2000/svg" width="260" height="260" viewBox="0 0 260 260">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="avatar-clip">
      <circle cx="130" cy="130" r="115"/>
    </clipPath>
    <radialGradient id="ring-gradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#C084FC" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0.3"/>
    </radialGradient>
  </defs>

  <!-- Animated outer ring -->
  <circle cx="130" cy="130" r="125" fill="none" stroke="url(#ring-gradient)" stroke-width="3" filter="url(#glow)">
    <animate attributeName="stroke-width" values="2;5;2" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Second glow ring -->
  <circle cx="130" cy="130" r="120" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.4">
    <animate attributeName="r" values="118;125;118" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Avatar background -->
  <circle cx="130" cy="130" r="115" fill="#1a1a2e"/>

  <!-- Avatar image -->
  <image href="https://avatars.githubusercontent.com/u/305492482?v=4"
         x="15" y="15" width="230" height="230"
         clip-path="url(#avatar-clip)"/>
</svg>
